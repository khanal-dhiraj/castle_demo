name: insta-engineer

on:
  issues:
    types: [labeled]

concurrency:
  group: insta-engineer

permissions:
  issues: write
  contents: write
  pull-requests: write

jobs:
  run:
    if: github.event.label.name == 'insta-engineer'
    runs-on: ubuntu-latest
    timeout-minutes: 300
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      # The sandcastle CLI auto-passes --build-arg AGENT_UID=$(id -u) AGENT_GID=$(id -g).
      # On ubuntu-latest the runner is UID 1001 / GID 127 (ADR-0002), so the build
      # args land as AGENT_UID=1001 AGENT_GID=127 without explicit flags.
      - name: Build sandcastle Docker image
        run: npx sandcastle docker build-image

      - name: Run orchestrator
        run: npx tsx .sandcastle/main.mts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
